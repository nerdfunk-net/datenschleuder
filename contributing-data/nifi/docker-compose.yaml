services:
    zookeeper-1:
        hostname: zookeeper-docker-1.nifi.local
        image: zookeeper:3.9.5
        restart: always
        environment:
          ALLOW_ANONYMOUS_LOGIN: yes
          ZOO_MY_ID: 1
          ZOO_SERVERS: server.1=zookeeper-docker-1.nifi.local:2888:3888;2181 server.2=zookeeper-docker-2.nifi.local:2888:3888;2181 server.3=zookeeper-docker-3.nifi.local:2888:3888;2181
        networks:
          - backend
    zookeeper-2:
        hostname: zookeeper-docker-2.nifi.local
        image: zookeeper:3.9.5
        restart: always
        environment:
          ALLOW_ANONYMOUS_LOGIN: yes
          ZOO_MY_ID: 2
          ZOO_SERVERS: server.1=zookeeper-docker-1.nifi.local:2888:3888;2181 server.2=zookeeper-docker-2.nifi.local:2888:3888;2181 server.3=zookeeper-docker-3.nifi.local:2888:3888;2181
        networks:
          - backend
    zookeeper-3:
        hostname: zookeeper-docker-3.nifi.local
        image: zookeeper:3.9.5
        restart: always
        environment:
          ALLOW_ANONYMOUS_LOGIN: yes
          ZOO_MY_ID: 3
          ZOO_SERVERS: server.1=zookeeper-docker-1.nifi.local:2888:3888;2181 server.2=zookeeper-docker-2.nifi.local:2888:3888;2181 server.3=zookeeper-docker-3.nifi.local:2888:3888;2181
        networks:
          - backend

    nifi-docker-1:
        hostname: nifi-docker-1.nifi.local
        image: apache/nifi:2.8.0
        ports:
          - 8443:8443
        depends_on:
          - zookeeper-1
          - zookeeper-2
          - zookeeper-3
        environment:
          NIFI_WEB_HTTPS_PORT: 8443
          NIFI_CLUSTER_IS_NODE: true
          NIFI_CLUSTER_ADDRESS: nifi-docker-1.nifi.local
          NIFI_CLUSTER_NODE_PROTOCOL_PORT: 11443
          NIFI_ZK_CONNECT_STRING: zookeeper-docker-1.nifi.local:2181,zookeeper-docker-2.nifi.local:2181,zookeeper-docker-3.nifi.local:2181
          NIFI_ELECTION_MAX_WAIT: 1 mins
          NIFI_ELECTION_MAX_CANDIDATES: 3
        volumes:
          - ./node-1/conf/:/opt/nifi/nifi-current/conf
          - ./node-1/repos/database/:/opt/nifi/nifi-current/database_repository
          - ./node-1/repos/flowfile/:/opt/nifi/nifi-current/flowfile_repository
          - ./node-1/repos/content_repository:/opt/nifi/nifi-current/content_repository
          - ./node-1/repos/provenance_repository:/opt/nifi/nifi-current/provenance_repository
          - ./node-1/state:/opt/nifi/nifi-current/state
          - ./node-1/logs:/opt/nifi/nifi-current/logs
        networks:
            - backend

    nifi-docker-2:
        hostname: nifi-docker-2.nifi.local
        image: apache/nifi:2.8.0
        ports:
          - 9443:9443
        depends_on:
          - nifi-docker-1
        environment:
          NIFI_WEB_HTTPS_PORT: 9443
          NIFI_CLUSTER_IS_NODE: true
          NIFI_CLUSTER_ADDRESS: nifi-docker-2.nifi.local
          NIFI_CLUSTER_NODE_PROTOCOL_PORT: 11443
          NIFI_ZK_CONNECT_STRING: zookeeper-docker-1.nifi.local:2181,zookeeper-docker-2.nifi.local:2181,zookeeper-docker-3.nifi.local:2181
          NIFI_ELECTION_MAX_WAIT: 1 mins
          NIFI_ELECTION_MAX_CANDIDATES: 3
        volumes:
          - ./node-2/conf/:/opt/nifi/nifi-current/conf
          - ./node-2/repos/database/:/opt/nifi/nifi-current/database_repository
          - ./node-2/repos/flowfile/:/opt/nifi/nifi-current/flowfile_repository
          - ./node-2/repos/content_repository:/opt/nifi/nifi-current/content_repository
          - ./node-2/repos/provenance_repository:/opt/nifi/nifi-current/provenance_repository
          - ./node-2/state:/opt/nifi/nifi-current/state
          - ./node-2/logs:/opt/nifi/nifi-current/logs
        networks:
            - backend

    nifi-docker-3:
        hostname: nifi-docker-3.nifi.local
        image: apache/nifi:2.8.0
        ports:
          - 10443:10443
        depends_on:
          - nifi-docker-1
          - nifi-docker-2
        environment:
          NIFI_WEB_HTTPS_PORT: 10443
          NIFI_CLUSTER_IS_NODE: true
          NIFI_CLUSTER_ADDRESS: nifi-docker-3.nifi.local
          NIFI_CLUSTER_NODE_PROTOCOL_PORT: 11443
          NIFI_ZK_CONNECT_STRING: zookeeper-docker-1.nifi.local:2181,zookeeper-docker-2.nifi.local:2181,zookeeper-docker-3.nifi.local:2181
          NIFI_ELECTION_MAX_WAIT: 1 mins
          NIFI_ELECTION_MAX_CANDIDATES: 3
        volumes:
          - ./node-3/conf/:/opt/nifi/nifi-current/conf
          - ./node-3/repos/database/:/opt/nifi/nifi-current/database_repository
          - ./node-3/repos/flowfile/:/opt/nifi/nifi-current/flowfile_repository
          - ./node-3/repos/content_repository:/opt/nifi/nifi-current/content_repository
          - ./node-3/repos/provenance_repository:/opt/nifi/nifi-current/provenance_repository
          - ./node-3/state:/opt/nifi/nifi-current/state
          - ./node-3/logs:/opt/nifi/nifi-current/logs
        networks:
            - backend

networks:
  backend:
    external: true
